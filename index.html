<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Любима музика - JavaScript версия</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-app">
        <h1>🎵 Любима музика</h1>
        
        <form id="songForm">
            <div class="input-group">
                <label for="songName">Име на песен:</label>
                <input type="text" id="songName" placeholder="Въведете име на песен" required>
            </div>

            <div class="input-group">
                <label for="artist">Изпълнител:</label>
                <input type="text" id="artist" placeholder="Въведете изпълнител" required>
            </div>

            <div class="input-group">
                <label for="genre">Жанр:</label>
                <select id="genre">
                    <option>Поп</option>
                    <option>Рок</option>
                    <option>Хип-хоп</option>
                    <option>Джаз</option>
                    <option>Класическа</option>
                    <option>Електро</option>
                    <option>Поп фолк</option>
                    <option>Фолк</option>
                </select>
            </div>

            <div class="input-group">
                <label>Формат:</label>
                <div class="format-group">
                    <label>
                        <input type="radio" name="format" value="Single" checked> Single
                    </label>
                    <label>
                        <input type="radio" name="format" value="Album"> Album
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="rating">Оценка:</label>
                <div class="rating-container">
                    <div class="rating-slider">
                        <input type="range" id="rating" min="1" max="10" value="5" step="1">
                        <span class="rating-value" id="ratingDisplay">Оценка: 5</span>
                    </div>
                    <div class="rating-labels">
                        <span style="color: #ff6b6b;">★ 1</span>
                        <span style="color: #feca57;">★ 5</span>
                        <span style="color: #48dbfb;">★ 10</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="hasVideo"> Има видеоклип
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-add" id="addBtn">
                    <span>➕</span> Добави песен
                </button>
                <button type="button" class="btn-save" id="saveBtn">
                    <span>💾</span> Запази плейлист
                </button>
                <button type="button" class="btn-sort" id="sortBtn">
                    <span>📊</span> Сортирай по оценка
                </button>
            </div>
        </form>

        <div class="progress-bar">
            <div class="progress-fill" id="progressBar">0 песни</div>
        </div>

        <div class="playlist-area">
            <div class="playlist-header">
                <span>🎵 Плейлист</span>
                <span class="song-count" id="songCount">0 песни</span>
            </div>
            <div class="songs-container" id="playlist">
                <!-- Тук ще се добавят песните -->
            </div>
        </div>

        <footer>
            <span>© 2026 Любима музика - Всички права запазени</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
